; PlatformIO Project Configuration File
;
; TX / RX 切换现在直接写在不同环境里：
; 1. 发射端环境：heltec_wifi_lora_32_V3_tx
; 2. 接收端环境：heltec_wifi_lora_32_V3_rx
;
; 当前默认环境设为接收端。
; 如果要烧录发射端，在 VSCode / PlatformIO 中选择
; `heltec_wifi_lora_32_V3_tx` 再 Upload 即可。

[platformio]
default_envs = heltec_wifi_lora_32_V3_tx

[common]
monitor_speed = 115200
lib_deps =
  jgromes/RadioLib @ ^7.3.0
  adafruit/Adafruit GFX Library @ ^1.12.1
  adafruit/Adafruit SSD1306 @ ^2.5.13
common_build_flags =
  -D APP_TX_STARTUP_JITTER_MAX_MS=200
  -D APP_TX_PACKET_JITTER_MAX_MS=5

[env:heltec_wifi_lora_32_V3_rx]

platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps =
  ${common.lib_deps}
build_flags =
  ${common.common_build_flags}
  -D ROLE_RX
; 接收端串口，按实际修改
upload_port = COM6
monitor_port = COM6

[env:heltec_wifi_lora_32_V3_tx]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps =
  ${common.lib_deps}
build_flags =
  ${common.common_build_flags}
  -D ROLE_TX
  -D APP_DEVICE_ID_VALUE=1001
  -D APP_LORA_FREQUENCY_MHZ_VALUE=470.0f
; 发射端串口，按实际修改
; upload_port = COM7
; monitor_port = COM7

; 如果后面要扩展更多发射节点，可仿照下面新增环境：
;
; [env:heltec_wifi_lora_32_V3_tx_1002]
; platform = espressif32
; board = heltec_wifi_lora_32_V3
; framework = arduino
; monitor_speed = ${common.monitor_speed}
; lib_deps =
;   ${common.lib_deps}
; build_flags =
;   ${common.common_build_flags}
;   -D ROLE_TX
;   -D APP_DEVICE_ID_VALUE=1002
;   -D APP_LORA_FREQUENCY_MHZ_VALUE=470.0f
; ; upload_port = COM7
; ; monitor_port = COM7
