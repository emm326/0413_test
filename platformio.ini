; PlatformIO Project Configuration File
;
; Switch role and node parameters here with the smallest possible change.
; Only keep one active build_flags block at a time.
;
; RX gateway example:
; build_flags =
;   -D ROLE_RX
;
; TX node example for device 1001 on gateway group 1:
; build_flags =
;   -D ROLE_TX
;   -D APP_DEVICE_ID_VALUE=1001
;   -D APP_LORA_FREQUENCY_MHZ_VALUE=470.0f
;
; TX node example for device 1002 on gateway group 1:
; build_flags =
;   -D ROLE_TX
;   -D APP_DEVICE_ID_VALUE=1002
;   -D APP_LORA_FREQUENCY_MHZ_VALUE=470.0f
;
; TX node example for device 1003 on gateway group 2:
; build_flags =
;   -D ROLE_TX
;   -D APP_DEVICE_ID_VALUE=1003
;   -D APP_LORA_FREQUENCY_MHZ_VALUE=470.5f
;
; Optional tuning:
;   -D APP_TX_STARTUP_JITTER_MAX_MS=200
;   -D APP_TX_PACKET_JITTER_MAX_MS=5

[env:heltec_wifi_lora_32_V3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino

monitor_speed = 115200

; Update these to the board currently plugged in
; upload_port = COM6
; monitor_port = COM6

lib_deps =
  jgromes/RadioLib @ ^7.3.0
  adafruit/Adafruit GFX Library @ ^1.12.1
  adafruit/Adafruit SSD1306 @ ^2.5.13

build_flags =
  -D ROLE_TX
  -D APP_DEVICE_ID_VALUE=1001
  -D APP_LORA_FREQUENCY_MHZ_VALUE=470.0f
